{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto px-2 py-6">
  <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-2 mb-4">
    <h1 class="text-2xl font-semibold">Companies</h1>

   <div class="flex gap-2">
      <a class="px-3 py-2 rounded-xl bg-white shadow hover:shadow-md transition text-sm"
        href="{% url 'jobtracker:jobtracker_dashboard' %}">
        Back
      </a>

      <a href="{% url 'jobtracker:company_create' %}"
        class="px-3 py-2 rounded-xl bg-emerald-600 text-white shadow hover:shadow-md transition text-sm">
        + Add Company
      </a>
      </div>
  </div>

  <div class="bg-white rounded-2xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50">
        <tr>
          <th class="text-left p-3">Company</th>
          <th class="text-right p-3">Jobs</th>
          <th class="text-right p-3">Contacts</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        {% for c in companies %}
          <tr>
            <td class="p-3">
              <a class="underline" href="{% url 'jobtracker:company_detail' c.id %}">
                {{ c.name }}
              </a>
            </td>
            <td class="p-3 text-right">{{ c.job_count }}</td>
            <td class="p-3 text-right">{{ c.contact_count }}</td>
          </tr>
        {% empty %}
          <tr><td class="p-3 text-gray-500" colspan="3">No companies yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
